<!DOCTYPE html>
<html lang="zh-TW" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇宙大爆炸 God Mode 3.1 完全體</title>
    <style>
        /* 基礎與主題設定 */
        :root {
            --bg-color: #e2e8f0; --text-color: #0f172a; --card-bg: rgba(255, 255, 255, 0.7);
            --primary: #8b5cf6; --neon-shadow: 0 0 0 transparent; --font-family: system-ui;
        }
        [data-theme="dark"] {
            --bg-color: #020617; --text-color: #e2e8f0; --card-bg: rgba(15, 23, 42, 0.7);
            --primary: #c084fc; --neon-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary);
        }
        
        /* 動態字體與背景雜訊 */
        html { font-size: 16px; transition: font-size 0.3s; }
        body { font-family: var(--font-family); background: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; overflow-x: hidden; transition: background 0.5s, color 0.5s; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E'); pointer-events: none; z-index: 9999; }

        /* Matrix 畫布 */
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0; transition: opacity 1s; pointer-events: none; }

        header {
            position: sticky; top: 0; z-index: 1000; padding: 1rem 2rem;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); background: var(--card-bg);
            border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px;
        }

        /* 標題特效 */
        .glitch { position: relative; display: inline-block; font-weight: 900; font-size: 1.5rem; margin: 0;}
        .glitch::before, .glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8; }
        .glitch::before { left: 2px; text-shadow: -2px 0 red; animation: glitch-anim 2s infinite linear alternate-reverse; }
        .glitch::after { left: -2px; text-shadow: -2px 0 blue; animation: glitch-anim 3s infinite linear alternate-reverse; }
        @keyframes glitch-anim { 0% { clip-path: inset(20% 0 80% 0); } 20% { clip-path: inset(60% 0 10% 0); } 40% { clip-path: inset(40% 0 50% 0); } 60% { clip-path: inset(80% 0 5% 0); } 100% { clip-path: inset(10% 0 60% 0); } }
        .blink::after { content: '█'; animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* 按鈕樣式與液態邊框 */
        .btn, input {
            padding: 8px 12px; border: none; border-radius: 8px; background: var(--bg-color); color: var(--text-color); cursor: pointer;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.1), -3px -3px 6px rgba(255,255,255,0.5); transition: 0.3s; box-sizing: border-box; font-weight: bold; font-size: 0.9rem;
        }
        [data-theme="dark"] .btn, [data-theme="dark"] input { box-shadow: 3px 3px 6px rgba(0,0,0,0.5), -3px -3px 6px rgba(255,255,255,0.05); }
        .btn:hover { box-shadow: inset 3px 3px 6px rgba(0,0,0,0.1), inset -3px -3px 6px rgba(255,255,255,0.5); text-shadow: var(--neon-shadow); transform: translateY(-2px); }
        .liquid { animation: liquid-border 4s ease-in-out infinite; border: 2px solid var(--primary); }
        @keyframes liquid-border { 0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; } 50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; } }

        /* 卡片網格與特效 */
        .container { padding: 2rem; display: grid; gap: 2rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); perspective: 1000px; }
        
        .card {
            background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.2);
            resize: both; overflow: hidden; position: relative; transition: transform 0.5s, opacity 0.5s; cursor: grab;
        }
        .card.dragging { opacity: 0.5; cursor: grabbing; transform: scale(1.05); }
        .hidden-scroll { opacity: 0; transform: translateY(50px) rotateX(-20deg); }
        .show-scroll { opacity: 1; transform: translateY(0) rotateX(0); transition: all 0.8s cubic-bezier(0.5, 0, 0, 1); }
        .card img { width: 100%; border-radius: 10px; filter: grayscale(100%); transition: 0.5s; object-fit: cover; height: 150px; }
        .card:hover img { filter: grayscale(0%); transform: scale(1.05); }

        .hud { font-family: monospace; font-size: 11px; color: var(--primary); display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 5px; }
        
        /* 輔助區塊 */
        .controls-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; align-items: center; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <header id="main-header">
        <div>
            <h1 class="glitch blink" data-text="OS: God Mode 3.1">OS: God Mode 3.1</h1>
            <div class="hud">
                <span id="hw-info">💻 CPU: --</span>
                <span id="mem-info">🧠 RAM: --</span>
                <span id="net-info">📶 網速: --</span>
            </div>
        </div>
        <div>
            <div class="controls-group">
                <button class="btn" id="font-up">A+</button>
                <button class="btn" id="font-down">A-</button>
                <button class="btn" id="theme-btn">🌙 切換主題</button>
                <button class="btn" id="fullscreen-btn">🗂 全螢幕</button>
                <button class="btn" id="auto-scroll-btn">⬇️ 自動滾動</button>
                <button class="btn" id="matrix-btn" style="color:#0f0; border: 1px solid #0f0;">🌧️ Matrix</button>
            </div>
            <div class="controls-group">
                <input type="text" id="mega-search" placeholder="搜尋並儲存..." class="liquid">
                <button class="btn" id="voice-btn">🎤 語音</button>
                <button class="btn" id="cam-btn">📷 相機</button>
                <button class="btn" id="share-btn">📤 分享</button>
                <button class="btn" id="destruct-btn" style="color:red;">⚠️ 自毀</button>
            </div>
        </div>
    </header>

    <video id="camera-view" autoplay playsinline style="display:none; position:fixed; bottom:20px; right:20px; width:200px; border-radius:10px; z-index:1000; box-shadow: 0 10px 20px rgba(0,0,0,0.5);"></video>

    <main class="container" id="grid-container"></main>

    <script>
        const S = document.getElementById.bind(document);
        let cardsData = Array.from({length: 12}, (_, i) => ({ id: i, title: `神話檔案 #${i}`, desc: `絕密資料庫載入中... 系統版本 ${Math.random().toString(36).substr(2, 5)}` }));

        // =========================================
        // 🌟 強勢回歸：遺失的五大經典功能
        // =========================================

        // 1. 字體縮放 (Font Resize)
        let currentFont = 16;
        S('font-up').onclick = () => { currentFont += 2; document.documentElement.style.fontSize = currentFont + 'px'; };
        S('font-down').onclick = () => { currentFont = Math.max(12, currentFont - 2); document.documentElement.style.fontSize = currentFont + 'px'; };

        // 2. 切換主題 (Theme Toggle) - 加上手動按鈕
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.body.setAttribute('data-theme', prefersDark ? 'dark' : 'light'); // 自動偵測初始值
        S('theme-btn').onclick = () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        };

        // 3. 全螢幕 (Fullscreen)
        S('fullscreen-btn').onclick = () => {
            if(!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };

        // 4. 自動滾動 (Auto Scroll)
        let autoScrollInt;
        S('auto-scroll-btn').onclick = function() {
            if(autoScrollInt) { clearInterval(autoScrollInt); autoScrollInt = null; this.innerText = '⬇️ 自動滾動'; }
            else { autoScrollInt = setInterval(() => window.scrollBy(0, 1), 20); this.innerText = '⏸️ 暫停滾動'; }
        };

        // 5. 駭客任務代碼雨 (Matrix Canvas)
        const mCanvas = S('matrix-canvas'); const mCtx = mCanvas.getContext('2d');
        mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~".split('');
        const mFontSize = 16; const columns = mCanvas.width / mFontSize; const drops = Array(Math.floor(columns)).fill(1);
        let matrixActive = false, matrixInt;
        
        const drawMatrix = () => {
            mCtx.fillStyle = "rgba(0, 0, 0, 0.05)"; mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
            mCtx.fillStyle = "#0F0"; mCtx.font = mFontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                mCtx.fillText(text, i * mFontSize, drops[i] * mFontSize);
                if (drops[i] * mFontSize > mCanvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        };
        S('matrix-btn').onclick = () => {
            matrixActive = !matrixActive;
            if (matrixActive) { mCanvas.style.opacity = 1; mCanvas.style.zIndex = 1; matrixInt = setInterval(drawMatrix, 33); }
            else { mCanvas.style.opacity = 0; mCanvas.style.zIndex = -1; clearInterval(matrixInt); }
        };
        window.addEventListener('resize', () => { mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight; });

        // =========================================
        // 🚀 God Mode 進階功能保留區
        // =========================================

        // 硬體監控
        S('hw-info').innerText = `💻 CPU: ${navigator.hardwareConcurrency || '?'}核 | 🌐 ${navigator.language}`;
        setInterval(() => { if(performance.memory) S('mem-info').innerText = `🧠 RAM: ${(performance.memory.usedJSHeapSize/1048576).toFixed(1)}MB`; }, 1000);
        if(navigator.connection) {
            const updateNet = () => S('net-info').innerText = `📶 網速: ${navigator.connection.downlink}Mbps`;
            navigator.connection.addEventListener('change', updateNet); updateNet();
        }

        // 語音控制
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(SpeechRec) {
            const rec = new SpeechRec(); rec.lang = 'zh-TW';
            rec.onresult = e => { S('mega-search').value = e.results[0][0].transcript; S('mega-search').dispatchEvent(new Event('input')); };
            S('voice-btn').onclick = () => { rec.start(); S('voice-btn').innerText = "🔴 聆聽中..."; setTimeout(()=>S('voice-btn').innerText = "🎤 語音", 3000); };
        }

        // 相機預覽
        const video = S('camera-view');
        S('cam-btn').onclick = async () => {
            if(video.srcObject) { 
                if(document.pictureInPictureElement) document.exitPictureInPicture();
                else video.requestPictureInPicture();
                return; 
            }
            try { video.srcObject = await navigator.mediaDevices.getUserMedia({video: true}); video.style.display = 'block'; } catch(e) { alert("無相機權限"); }
        };

        // 原生分享
        S('share-btn').onclick = () => {
            if(navigator.share) navigator.share({title: 'God Mode 3.1', url: window.location.href});
            else alert("不支援原生分享");
        };

        // 自毀程式
        S('destruct-btn').onclick = () => {
            document.body.style.transform = "scale(0) rotate(720deg)"; document.body.style.opacity = "0"; document.body.style.transition = "2s cubic-bezier(0.5, 0, 0, 1)";
            if(navigator.vibrate) navigator.vibrate([500, 100, 500]);
            setTimeout(() => { document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:40vh;'>SYSTEM DESTROYED.</h1>"; document.body.style.transform="none"; document.body.style.opacity="1"; }, 2000);
        };

        // 搜尋與草稿
        const searchInput = S('mega-search');
        searchInput.value = localStorage.getItem('search_draft') || '';
        searchInput.addEventListener('input', (e) => {
            localStorage.setItem('search_draft', e.target.value);
            renderCards(e.target.value);
        });

        // =========================================
        // 🃏 卡片渲染與拖曳特效
        // =========================================
        
        const container = S('grid-container');
        let dragged;

        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('show-scroll'); });
        }, { threshold: 0.1 });

        const renderCards = (filter = '') => {
            container.innerHTML = '';
            cardsData.filter(c => c.title.includes(filter) || c.desc.includes(filter)).forEach((cardData) => {
                const card = document.createElement('article');
                card.className = 'card hidden-scroll';
                card.draggable = true;
                
                card.innerHTML = `
                    <img src="https://picsum.photos/400/200?random=${cardData.id}" alt="Cover">
                    <h2 style="mix-blend-mode: difference; color: white;">${cardData.title}</h2>
                    <p>${cardData.desc}</p>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button class="btn copy-btn">📋 複製</button>
                        <button class="btn del-btn" style="background:#ef4444; color:white;">❌ 刪除</button>
                    </div>
                `;

                // 拖曳功能
                card.addEventListener('dragstart', () => { dragged = card; card.classList.add('dragging'); });
                card.addEventListener('dragend', () => card.classList.remove('dragging'));
                card.addEventListener('dragover', e => e.preventDefault());
                card.addEventListener('drop', e => { e.preventDefault(); container.insertBefore(dragged, card); });

                // 複製功能
                card.querySelector('.copy-btn').onclick = () => { navigator.clipboard.writeText(cardData.desc); alert("已複製！"); };
                
                // 刪除功能
                card.querySelector('.del-btn').onclick = () => { card.remove(); };

                container.appendChild(card);
                observer.observe(card);
            });
        };

        // 無限滾動
        window.addEventListener('scroll', () => {
            if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
                const newId = cardsData.length;
                cardsData.push({ id: newId, title: `無限擴展 #${newId}`, desc: `來自深淵的資料...`});
                renderCards(searchInput.value);
            }
        });

        renderCards();

    </script>
</body>
</html>
